<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>أذكار وآداب الصباح والمساء</title>
<style>body{font-family:system-ui,sans-serif;display:grid;place-items:center;min-height:100vh;margin:0;background:#fff;color:#155b33}.msg{padding:24px;text-align:center;font-weight:700}</style>
</head>
<body><div class="msg">جارٍ فتح الكتاب التفاعلي…</div>
<script>
(async()=>{
  try{
    const n=23;
    const parts=await Promise.all(Array.from({length:n},(_,i)=>fetch(`parts/part${String(i).padStart(3,'0')}.txt`).then(r=>{if(!r.ok)throw new Error(r.status);return r.text()})));
    document.open();document.write(parts.join(''));document.close();
  }catch(e){document.body.innerHTML='<div class="msg">تعذر تحميل الكتاب. أعد تحديث الصفحة.</div>'}
})();
</script>
</body></html>
